<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore | SpaceTrain</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <!-- Top Navbar -->
  <nav class="navbar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
      Space<span>Train</span>
    </div>
    <div class="nav-links">
      <a th:href="@{/}">Dashboard</a>
      <a th:href="@{/}" class="active">Explore</a>
      <a th:href="@{/gallery}">My Gallery</a>
      <a th:href="@{/}">Community</a>
      <a th:href="@{/}">Profile</a>
    </div>
    <button class="btn-primary" id="btn-add-image">+ Add Image</button>
  </nav>

  <!-- Main Layout -->
  <div class="container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Categories</h3>
      <ul class="filter-list">
        <li>
          <a href="#" class="active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path></svg>
            Planets
          </a>
        </li>
        <li>
          <a href="#">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            Stars
          </a>
        </li>
        <li>
          <a href="#">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M2 15h10"></path><path d="M5 18h7"></path></svg>
            Comets
          </a>
        </li>
        <li>
          <a href="#">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="2" x2="12" y2="22"></line><path d="M12 12L22 12"></path></svg>
            Constellations
          </a>
        </li>
      </ul>
    </aside>

    <!-- Content -->
    <main class="content">
      <div class="page-header">
        <h2>Explore the Universe</h2>
      </div>

      <div class="masonry-grid">
        <!-- Sample Image 1 -->
        <div class="grid-item">
          <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=600&auto=format&fit=crop" alt="Earth from space">
          <div class="grid-item-overlay">
            <h4>Blue Marble</h4>
            <p>Planet</p>
          </div>
        </div>
        <!-- Sample Image 2 -->
        <div class="grid-item">
          <img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=600&auto=format&fit=crop" alt="Nebula">
          <div class="grid-item-overlay">
            <h4>Orion Nebula</h4>
            <p>Constellation Area</p>
          </div>
        </div>
        <!-- Sample Image 3 -->
        <div class="grid-item">
          <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?q=80&w=600&auto=format&fit=crop" alt="Mars">
          <div class="grid-item-overlay">
            <h4>Red Planet</h4>
            <p>Planet</p>
          </div>
        </div>
        <!-- Sample Image 4 -->
        <div class="grid-item">
          <img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?q=80&w=600&auto=format&fit=crop" alt="Milky Way">
          <div class="grid-item-overlay">
            <h4>Milky Way Core</h4>
            <p>Stars</p>
          </div>
        </div>
        <!-- Sample Image 5 -->
        <div class="grid-item">
          <img src="https://images.unsplash.com/photo-1543722530-d2c3201371e7?q=80&w=600&auto=format&fit=crop" alt="Moon">
          <div class="grid-item-overlay">
            <h4>Lunar Surface</h4>
            <p>Planet Satellite</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Image Modal -->
  <div class="modal-overlay" id="add-image-modal">
    <div class="modal-content">
      <button class="close-btn" id="btn-close-modal">&times;</button>
      <h2>Post to SpaceTrain</h2>
      
      <form id="add-image-form" method="post" action="/post">
        <div class="form-group file-upload-area">
          <label for="file-upload">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" style="margin-bottom:10px;">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <br>
            Click to upload your space photo
          </label>
          <input type="file" id="file-upload" accept="image/*">
        </div>

        <div class="form-group">
          <label for="photo-title">Title</label>
          <input type="text" id="photo-title" name="titulo" class="form-control" placeholder="e.g. Andromeda Galaxy" required>
        </div>

        <div class="form-group">
          <label for="photo-category">Category</label>
          <select id="photo-category" name="categoria" class="form-control" required>
            <option value="planet">Planet</option>
            <option value="star">Star</option>
            <option value="comet">Comet</option>
            <option value="constellation">Constellation</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cliente-id">Client ID</label>
          <input type="number" id="cliente-id" name="clienteId" class="form-control" placeholder="Enter client ID" required>
        </div>

        <button type="submit" class="btn-primary btn-block">Upload Image</button>
      </form>
    </div>
  </div>

  <script th:src="@{/js/script.js}"></script>
</body>
</html>
