<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>My Gallery</title>
</head>
<body>
  <main layout:fragment="content" class="content">
      <div class="page-header">
        <h2>My Gallery</h2>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">Manage the beautiful moments you captured.</p>
      </div>

      <div class="masonry-grid" th:if="${imagensUsuario != null and #lists.size(imagensUsuario) > 0}">
        <div class="grid-item" th:each="imagem : ${imagensUsuario}">
          <img th:src="${imagem.endereco}" th:alt="${imagem.titulo}" alt="Upload image">
          <div class="grid-item-overlay">
            <h4 th:text="${imagem.titulo}">Image title</h4>
            <p th:text="${imagem.descricao != null ? imagem.descricao : 'No description'}">Image description</p>
            <button class="btn-edit-image"
                    th:data-id="${imagem.id}"
                    th:data-titulo="${imagem.titulo}"
                    th:data-descricao="${imagem.descricao}"
                    th:data-categorias="${imagem.categoriaIds}">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
              </svg>
              Editar
            </button>
          </div>
        </div>
      </div>
      <div class="empty-state" th:if="${imagensUsuario == null or #lists.isEmpty(imagensUsuario)}">
        <p>Ainda não há uploads seus. Use o botão + Add Image para enviar sua primeira imagem.</p>
      </div>
  </main>

</body>
</html>
