<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar - SpaceTrain</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: var(--bg-panel-hover);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .login-header h1 span {
      color: var(--accent-cyan);
    }
    .login-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
    }
    .btn-block {
      width: 100%;
      margin-top: 1rem;
      font-size: 1rem;
      padding: 0.8rem;
    }
    .feedback-message {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
    }
    .feedback-error {
      background: rgba(255, 75, 75, 0.15);
      color: #ff4b4b;
      border: 1px solid rgba(255, 75, 75, 0.3);
    }
    .signup-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .signup-link a {
      color: var(--accent-cyan);
      font-weight: 600;
      transition: color 0.2s;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>Space<span>Train</span></h1>
        <p>Crie sua conta de astronauta</p>
      </div>
      
      <form th:action="@{/cadastrar}" method="post">
        <div class="form-group">
          <label for="nome">Nome de Usuário</label>
          <input type="text" id="nome" name="nome" class="form-control" placeholder="Como quer ser chamado" required />
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="seu@email.com" required />
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" class="form-control" placeholder="Crie uma senha segura" required />
        </div>
        
        <button type="submit" class="btn-primary btn-block">Criar Conta</button>
      </form>
      
      <div class="feedback-message feedback-error" th:if="${error != null}">
        <p th:if="${error == 'nome'}">Este nome de usuário já está em uso.</p>
        <p th:if="${error == 'email'}">Este endereço de e-mail já está cadastrado.</p>
        <p th:if="${error == 'generic'}">Ocorreu um erro ao cadastrar. Tente novamente.</p>
      </div>
      
      <div class="signup-link">
        Já tem uma conta? <a th:href="@{/login}">Fazer Login</a>
      </div>
    </div>
  </div>
</body>
</html>
